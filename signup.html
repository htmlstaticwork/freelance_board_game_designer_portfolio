<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayCraft | Join the Community</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-toggles {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .toggle-btn {
            color: #475569; /* Enhanced visibility in light mode */
            background: rgba(0, 0, 0, 0.05);
        }
        body.dark-mode .toggle-btn {
            color: #f1f5f9;
            background: rgba(255, 255, 255, 0.1);
        }
        @media (max-width: 480px) {
            .auth-header {
                padding-top: 30px; /* Room for toggles on mobile */
            }
            .auth-toggles {
                top: 10px;
                right: 10px;
                gap: 8px;
            }
            .toggle-btn {
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="auth-page">

    <div class="auth-card animate-up">
        <div class="auth-header">
            <div class="auth-toggles">
                <button class="toggle-btn" id="theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
                <button class="toggle-btn" id="rtl-toggle">RTL</button>
            </div>
            <a href="index.html" class="logo" style="font-size: 2.2rem;">
                <i class="fas fa-chess-knight"></i>
                <span>PlayCraft</span>
            </a>
        </div>
        
        <h2 style="text-align: center; margin-bottom: 5px;">Join the Lab</h2>
        <p style="text-align: center; opacity: 0.6; margin-bottom: 30px;">Start your board game design journey.</p>

        <form class="auth-form">
             <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
                </div>
            </div>
            <div class="auth-options">
                <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; white-space: nowrap;">
                    <input type="checkbox" required> 
                    <span style="white-space: nowrap;">I agree to the <a href="#" class="auth-link" style="font-weight: 600;">Terms of Service</a></span>
                </label>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Sign Up</button>
        </form>

        <div class="auth-divider">
            <hr>
            <span>OR CONTINUE WITH</span>
        </div>

        <div class="social-login">
            <button class="social-btn"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn"><i class="fab fa-apple"></i> Apple</button>
        </div>

        <p style="text-align: center; margin-top: 30px; font-size: 0.9rem;">
            Already have an account? <a href="login.html" class="auth-link" style="font-weight: 700;">Login Now</a>
        </p>
    </div>

    <script src="main.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelector('.password-toggle');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
