<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayCraft | Join the Community</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-toggles {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body class="auth-page">

    <div class="auth-card animate-up">
        <div class="auth-header">
            <div class="auth-toggles">
                <button class="toggle-btn" id="theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
                <button class="toggle-btn" id="rtl-toggle">RTL</button>
            </div>
            <a href="index.html" class="logo" style="font-size: 2.2rem;">
                <i class="fas fa-chess-knight"></i>
                <span>PlayCraft</span>
            </a>
        </div>
        
        <h2 style="text-align: center; margin-bottom: 5px;">Join the Lab</h2>
        <p style="text-align: center; opacity: 0.6; margin-bottom: 30px;">Start your board game design journey.</p>

        <form class="auth-form">
             <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
                </div>
            </div>
            <div class="auth-options">
                <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; white-space: nowrap;">
                    <input type="checkbox" required> 
                    <span style="white-space: nowrap;">I agree to the <a href="#" style="color: var(--primary); font-weight: 600;">Terms of Service</a></span>
                </label>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Sign Up</button>
        </form>

        <div class="auth-divider">
            <hr>
            <span>OR CONTINUE WITH</span>
        </div>

        <div class="social-login">
            <button class="social-btn"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn"><i class="fab fa-apple"></i> Apple</button>
        </div>

        <p style="text-align: center; margin-top: 30px; font-size: 0.9rem;">
            Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 700;">Login Now</a>
        </p>
    </div>

    <script src="main.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelector('.password-toggle');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
