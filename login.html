<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayCraft | Welcome Back</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-toggles {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body class="auth-page">

    <div class="auth-toggles">
        <button class="toggle-btn" id="theme-toggle"><i class="fas fa-moon"></i></button>
        <button class="toggle-btn" id="rtl-toggle">RTL</button>
    </div>

    <div class="auth-card animate-up">
        <div class="auth-logo">
            <a href="index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                <i class="fas fa-chess-knight"></i>
                <span>PlayCraft</span>
            </a>
        </div>
        
        <h2 style="text-align: center; margin-bottom: 5px;">Welcome Back!</h2>
        <p style="text-align: center; opacity: 0.6; margin-bottom: 30px;">Login to your designer portal.</p>

        <form class="auth-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
                </div>
            </div>
            <div class="auth-options">
                <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; white-space: nowrap;">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" style="color: var(--primary);">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Sign In</button>
        </form>

        <div class="auth-divider">
            <hr>
            <span>OR CONTINUE WITH</span>
        </div>

        <div class="social-login">
            <button class="social-btn"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn"><i class="fab fa-apple"></i> Apple</button>
        </div>

        <p style="text-align: center; margin-top: 30px; font-size: 0.9rem;">
            New to PlayCraft? <a href="signup.html" style="color: var(--primary); font-weight: 700;">Create Account</a>
        </p>
    </div>

    <script src="main.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelector('.password-toggle');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
