<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayCraft | Welcome Back</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .floating-controls {
            display: flex;
            gap: 12px;
            z-index: 1000;
        }
        .toggle-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            color: #1e293b;
        }
        body.dark-mode .toggle-btn {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
        }
        
        /* Mobile & Tablet View (< 1024px) */
        @media (max-width: 1023px) {
            .floating-controls {
                position: fixed;
                top: 20px;
                right: 16px;
            }
            .auth-page {
                padding-top: 100px;
                align-items: flex-start;
            }
            .auth-card {
                margin-top: 0;
            }
        }
        
        /* Desktop View (>= 1024px) */
        @media (min-width: 1024px) {
            .floating-controls {
                position: absolute;
                top: 30px;
                right: 40px;
            }
        }
    </style>
</head>
<body class="auth-page">
    <div class="floating-controls">
        <button class="toggle-btn" id="theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
        <button class="toggle-btn" id="rtl-toggle">RTL</button>
    </div>

    <div class="auth-card animate-up">
        <div class="auth-header">
            <a href="index.html" class="logo" style="font-size: 2.2rem;">
                <i class="fas fa-chess-knight"></i>
                <span>PlayCraft</span>
            </a>
        </div>
        
        <h2 style="text-align: center; margin-bottom: 5px;">Welcome Back!</h2>
        <p style="text-align: center; opacity: 0.6; margin-bottom: 30px;">Login to your designer portal.</p>

        <form class="auth-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
                </div>
            </div>
            <div class="auth-options">
                <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; white-space: nowrap;">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="auth-link" style="font-weight: 600; white-space: nowrap;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Sign In</button>
        </form>

        <div class="auth-divider">
            <hr>
            <span>OR CONTINUE WITH</span>
        </div>

        <div class="social-login">
            <button class="social-btn"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn"><i class="fab fa-apple"></i> Apple</button>
        </div>

        <p style="text-align: center; margin-top: 30px; font-size: 0.9rem;">
            New to PlayCraft? <a href="signup.html" class="auth-link" style="font-weight: 700;">Create Account</a>
        </p>
    </div>

    <script src="main.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelector('.password-toggle');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
